<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Si'aa - Find Storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="../CSS/styles.css">
    <style>
        #search-map {
            height: 280px;
            width: 100%;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            z-index: 0;
        }

        .search-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 48px 20px;
            color: #718096;
            font-size: 16px;
        }

        .search-spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #e2e8f0;
            border-top-color: #ff6b35;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .search-empty {
            text-align: center;
            padding: 48px 20px;
            color: #a0aec0;
            font-size: 16px;
        }

        .search-empty i {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
        }

        .space-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .space-card-title {
            font-size: 17px;
            font-weight: 700;
            color: #1a365d;
            margin: 0 0 4px 0;
        }

        .space-card-location {
            font-size: 13px;
            color: #718096;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .space-card-location i {
            color: #ff6b35;
        }

        .space-card-price {
            text-align: right;
            flex-shrink: 0;
        }

        .price-amount {
            display: block;
            font-size: 22px;
            font-weight: 800;
            color: #ff6b35;
        }

        .price-unit {
            font-size: 12px;
            color: #a0aec0;
        }

        .space-card-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .space-meta-item {
            font-size: 13px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .space-meta-item i {
            color: #ff6b35;
        }

        .match-score {
            color: #e8750a;
            font-weight: 700;
        }

        .space-card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .space-tag {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
            background: #fff5f0;
            color: #ff6b35;
            border: 1px solid #ffd5c2;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .space-card-footer {
            display: flex;
            justify-content: flex-end;
            padding-top: 12px;
            border-top: 1px solid #f7fafc;
        }

        .btn-small {
            padding: 9px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <nav class="nav">
                    <a href="dashboard.html">Dashboard</a>
                    <a href="index.html#about">About</a>
                    <a href="index.html#features">Features</a>
                    <a href="index.html#how-it-works">How It Works</a>
                </nav>
                <div class="logo">
                    <img src="../Media/Logo.png" alt="Si'aa Logo" class="logo-img">
                </div>
            </div>
        </div>
    </header>

    <!-- STORAGE SEARCH -->
    <section class="storage-search">
        <div class="container">
            <h1 class="storage-search__title">Find the Right Storage Space</h1>
            <p class="storage-search__subtitle">
                Filter by size, price, and features to find a storage space that fits your needs.
            </p>

            <div class="storage-search__layout">

                <!-- LEFT SIDE: Filter Form -->
                <div class="storage-search__form-area">
                    <div class="filter-card">

                        <h2 class="filter-card__title">Search Filters</h2>

                        <form class="filter-form" action="#" method="get">

                            <!-- FILTER FIELDS GRID -->
                            <div class="filter-grid">

                                <!-- Location -->
                                <div class="filter-field">
                                    <span class="filter-field__label">Location</span>
                                    <select name="location_neighborhood" class="filter-select-input">
                                        <option value="">Any neighborhood</option>
                                        <option value="al-salama">Al-Salama</option>
                                        <option value="al-rawdah">Al-Rawdah</option>
                                        <option value="al-nahda">Al-Nahda</option>
                                        <option value="al-andalus">Al-Andalus</option>
                                        <option value="al-hamra">Al-Hamra</option>
                                        <option value="al-rehab">Al-Rehab</option>
                                        <option value="al-faisaliyah">Al-Faisaliyah</option>
                                        <option value="al-naeem">Al-Naeem</option>
                                        <option value="al-basateen">Al-Basateen</option>
                                        <option value="al-shati">Al-Shati (Corniche)</option>
                                        <option value="al-safa">Al-Safa</option>
                                        <option value="al-aziziyah">Al-Aziziyah</option>
                                        <option value="al-baghdadiyah">Al-Baghdadiyah</option>
                                        <option value="al-balad">Al-Balad</option>
                                    </select>
                                </div>

                                <!-- Storage Size (maps to StorageSpaces.Size) -->
                                <div class="filter-field">
                                    <span class="filter-field__label">Space Size (m²)</span>
                                    <select name="storage_size" class="filter-select-input">
                                        <option value="select">Any size</option>
                                        <option value="small">Small (1–3 m²)</option>
                                        <option value="medium">Medium (4–7 m²)</option>
                                        <option value="large">Large (8–12 m²)</option>
                                        <option value="xl">Extra Large (&gt;12 m²)</option>
                                    </select>
                                </div>

                                <!-- Price Range (maps to PricePerMonth) -->
                                <div class="filter-field filter-field--range">
                                    <div class="filter-field__range-header">
                                        <span class="filter-field__label">Price Range</span>
                                        <span class="filter-field__range-values">
                                            <span>80 SAR</span><span>5000 SAR</span>
                                        </span>
                                    </div>
                                    <input type="range" name="price_max" min="80" max="5000" value="1200"
                                        class="filter-range-input">
                                </div>

                                <!-- Rental Date (used later in booking flow, not for filtering now) -->
                                <div class="filter-field filter-field--date">
                                    <span class="filter-field__label">Start Date</span>
                                    <input type="date" name="rental_date" class="filter-text-input">
                                </div>

                                <!-- Space Type (maps to SpaceType in StorageSpaces) -->
                                <div class="filter-field">
                                    <span class="filter-field__label">Space Type</span>
                                    <select name="space_type" class="filter-select-input">
                                        <option value="">Any type</option>
                                        <option value="room">Indoor room</option>
                                        <option value="garage">Garage / parking</option>
                                        <option value="warehouse">Warehouse corner</option>
                                        <option value="outdoor">Outdoor covered area</option>
                                        <option value="Basement">Basement</option>
                                    </select>
                                </div>

                                <!-- Rental Duration (UX/AI hint; not strictly bound to DB yet) -->
                                <div class="filter-field">
                                    <span class="filter-field__label">Rental Duration</span>
                                    <select name="rental_duration" class="filter-select-input">
                                        <option value="select">Any</option>
                                        <option value="daily">Daily</option>
                                        <option value="weekly">Weekly</option>
                                        <option value="monthly">Monthly</option>
                                    </select>
                                </div>

                            </div>

                            <!-- ENVIRONMENT / FEATURES OPTIONS (maps to SpaceFeatures) -->
                            <div class="environment-options">
                                <label class="environment-option">
                                    <input type="checkbox" name="environment[]" value="climate">
                                    <span>Climate-controlled</span>
                                </label>
                                <label class="environment-option">
                                    <input type="checkbox" name="environment[]" value="temperature">
                                    <span>Temperature-controlled</span>
                                </label>
                                <label class="environment-option">
                                    <input type="checkbox" name="environment[]" value="humidity">
                                    <span>Humidity-controlled</span>
                                </label>
                                <label class="environment-option">
                                    <input type="checkbox" name="environment[]" value="dry">
                                    <span>Dry</span>
                                </label>
                                <label class="environment-option">
                                    <input type="checkbox" name="environment[]" value="secure">
                                    <span>Secure (security / CCTV)</span>
                                </label>
                                <label class="environment-option">
                                    <input type="checkbox" name="environment[]" value="parking">
                                    <span>Parking available</span>
                                </label>
                                <label class="environment-option">
                                    <input type="checkbox" name="environment[]" value="loading">
                                    <span>Loading assistance</span>
                                </label>
                                <label class="environment-option">
                                    <input type="checkbox" name="environment[]" value="access24">
                                    <span>24/7 access</span>
                                </label>
                            </div>

                            <button type="submit" class="btn btn-dark btn-large filter-submit-btn">
                                Search & Get Recommendations
                            </button>

                        </form>
                    </div>
                </div>

                <!-- RIGHT SIDE: RESULTS -->
                <aside class="storage-results">
                    <div class="storage-results__header">
                        <h2 class="storage-results__title">Results</h2>

                        <div class="sorting-control">
                            <label for="sortBy" class="sorting-control__label">Sort by</label>
                            <select name="sortBy" id="sortBy" class="sorting-control__select">
                                <option value="match">Match Score (Highest)</option>
                                <option value="priceLow">Price (Lowest first)</option>
                                <option value="priceHigh">Price (Highest first)</option>
                                <option value="distance">Distance (Closest)</option>
                            </select>
                        </div>
                    </div>

                    <!-- MAP -->
                    <div id="search-map"></div>

                    <div class="storage-results__list">
                        <article class="storage-card">
                            <p>Loading Spaces...</p>
                        </article>
                    </div>
                </aside>

            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="social-icons">
                    <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" aria-label="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                </div>
                <div class="footer-logo">
                    <img src="../Media/Logo.png" class="footer-logo-img" alt="">
                </div>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../Javascript/search.js"></script>
</body>

</html>
