<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Si'aa - Booking Confirmed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/styles.css">
    <style>
        .conf-card {
            background: #fff;
            border-radius: 24px;
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.1);
            text-align: center;
        }

        .conf-icon {
            width: 80px;
            height: 80px;
            background: #f0fdf4;
            color: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
        }

        .conf-title {
            font-size: 28px;
            color: #1a365d;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .conf-subtitle {
            color: #718096;
            margin-bottom: 32px;
        }

        .conf-details {
            text-align: left;
            background: #f8fafc;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .conf-detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .conf-detail-label {
            color: #64748b;
        }

        .conf-detail-value {
            color: #1e293b;
            font-weight: 600;
        }

        .conf-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
    </style>
</head>

<body class="bg-light">

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="../Media/Logo.png" alt="Si'aa Logo" class="logo-img">
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="conf-card">
            <div class="conf-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1 class="conf-title">Booking Confirmed!</h1>
            <p class="conf-subtitle">Thank you for choosing Si'aa. Your storage is ready.</p>

            <div class="conf-details" id="confDetails">
                <div style="text-align:center; padding:20px;">
                    <i class="fa-solid fa-spinner fa-spin" style="color:#ff6b35;"></i>
                </div>
            </div>

            <div class="conf-actions">
                <a href="dashboard.html" class="btn btn-dark">Go to Dashboard</a>
                <a href="search.html" class="btn btn-outline">Find More Spaces</a>
            </div>
        </div>
    </main>

    <script src="../Javascript/confirmation.js"></script>
</body>

</html>
